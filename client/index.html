<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clutch Zone - Gaming Matches</title>

    <!-- OneSignal SDK for Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        // Initialize OneSignal
        await OneSignal.init({
          appId: "30266cf2-2ad3-49c8-ae4f-1de697e22b8f",
        });

        // Setup notification event listeners (while SDK is ready)
        OneSignal.on('notificationDisplay', (event) => {
          console.log('📱 Notification displayed:', event.notification.heading);
        });

        OneSignal.on('notificationClicked', (event) => {
          const notification = event.notification;
          const data = notification.data;

          console.log('🔔 Notification clicked:', {
            title: notification.heading,
            data: data,
          });

          // Dispatch custom event for React to handle navigation
          window.dispatchEvent(new CustomEvent('onesignal-notification-clicked', { 
            detail: { notification, data } 
          }));
        });
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
