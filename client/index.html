<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff6a00" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <!-- Web App Manifest (CRITICAL FOR ANDROID) -->
    <link rel="manifest" href="/manifest.json" />
    
    <title>Clutch Zone - Gaming Matches</title>

    <!-- OneSignal SDK for Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      // PWA Installation Prompt
      let deferredPrompt;
      let installPromptShown = false;

      window.addEventListener('beforeinstallprompt', (e) => {
        console.log('🛠️ PWA install prompt available');
        e.preventDefault();
        deferredPrompt = e;

        // Show install prompt after user interaction
        const showInstallPrompt = () => {
          if (deferredPrompt && !installPromptShown) {
            installPromptShown = true;
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
              if (choiceResult.outcome === 'accepted') {
                console.log('✅ User accepted PWA installation');
              } else {
                console.log('❌ User dismissed PWA installation');
              }
              deferredPrompt = null;
            });
          }
        };

        // Show prompt on first meaningful interaction
        const handleInstallTrigger = () => {
          setTimeout(showInstallPrompt, 2000); // Delay to ensure OneSignal is ready
          document.removeEventListener('click', handleInstallTrigger);
          document.removeEventListener('touchstart', handleInstallTrigger);
          document.removeEventListener('keydown', handleInstallTrigger);
        };

        document.addEventListener('click', handleInstallTrigger, { once: true });
        document.addEventListener('touchstart', handleInstallTrigger, { once: true });
        document.addEventListener('keydown', handleInstallTrigger, { once: true });
      });

      window.addEventListener('appinstalled', (evt) => {
        console.log('🎉 PWA was installed');
      });

      // OneSignal SDK for Push Notifications
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        try {
          // Initialize OneSignal with explicit service worker configuration
          await OneSignal.init({
            appId: "30266cf2-2ad3-49c8-ae4f-1de697e22b8f",
            allowLocalhostAsSecureOrigin: true,
            serviceWorkerPath: '/OneSignalSDKWorker.js',
            serviceWorkerUpdaterPath: '/OneSignalSDKUpdaterWorker.js',
            serviceWorkerParam: { scope: '/' },
          });

          console.log('✅ OneSignal initialized successfully');

          // CRITICAL: Save player ID immediately when available
          const playerId = await OneSignal.User.PushSubscription.id;
          if (playerId) {
            console.log('🔥 Player ID available:', playerId);

            // Try to get user ID from localStorage (if logged in)
            const token = localStorage.getItem('clutchzone_token');
            let userId = null;
            
            if (token) {
              try {
                // Decode JWT to get user ID (simple decode, not secure validation)
                const payload = JSON.parse(atob(token.split('.')[1]));
                userId = payload.userId;
              } catch (e) {
                console.warn('Could not decode token for user ID');
              }
            }

            // Save to backend immediately (don't wait for login)
            try {
              const API_BASE = window.location.hostname === 'localhost' 
                ? 'http://localhost:5000/api' 
                : 'https://paid-scrims-app.onrender.com/api';
                
              const response = await fetch(`${API_BASE}/auth/notifications/register-push`, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': token ? `Bearer ${token}` : ''
                },
                body: JSON.stringify({ 
                  onesignalPlayerId: playerId,
                  userId: userId // Send userId in body as fallback
                })
              });
              
              if (response.ok) {
                console.log('✅ Player ID saved to backend');
              } else {
                console.warn('⚠️ Failed to save player ID to backend:', response.status);
                // Store locally as fallback
                localStorage.setItem('onesignal_player_id', playerId);
              }
            } catch (error) {
              console.warn('⚠️ Could not save player ID to backend:', error.message);
              // Store locally as fallback
              localStorage.setItem('onesignal_player_id', playerId);
            }
          }

          // FORCE USER SUBSCRIBE ON ANDROID - Shows slidedown prompt
          console.log('📱 Showing notification permission prompt...');

          let promptShown = false;
          const showPrompt = async () => {
            if (promptShown) return; // Only show once
            try {
              const currentPermission = await OneSignal.Notifications.permission;
              if (currentPermission) {
                console.log('🔔 Permission already granted');
                promptShown = true;
                return;
              }

              if (OneSignal.Notifications?.showSlidedownPrompt) {
                console.log('📱 Showing slidedown prompt...');
                await OneSignal.Notifications.showSlidedownPrompt();
                promptShown = true;
              }
            } catch (e) {
              console.warn('Could not show prompt:', e);
            }
          };

          // Show prompt on first user interaction (not on multiple timeouts)
          const handleFirstInteraction = async () => {
            console.log('👆 First user interaction detected, showing prompt...');
            await showPrompt();
            document.removeEventListener('click', handleFirstInteraction);
            document.removeEventListener('touchstart', handleFirstInteraction);
            document.removeEventListener('keydown', handleFirstInteraction);
          };

          // Show prompt after 2 seconds if permission not yet requested
          setTimeout(showPrompt, 2000);
          
          // Also show on user interaction
          document.addEventListener('click', handleFirstInteraction, { once: true });
          document.addEventListener('touchstart', handleFirstInteraction, { once: true });
          document.addEventListener('keydown', handleFirstInteraction, { once: true });


          // CAPTURE PLAYER ID - only once when permission is granted
          let playerIdCaptured = false;
          const checkAndCapturePlayerId = async () => {
            if (playerIdCaptured) return; // Prevent duplicate captures
            try {
              const permission = await OneSignal.Notifications.permission;
              console.log('🔔 Notification permission:', permission ? '✅ Granted' : '❌ Denied');

              if (permission) {
                const playerId = await OneSignal.User.PushSubscription.id;
                console.log("📱 Player ID captured:", playerId?.substring(0, 15) + '...');
                if (playerId) {
                  playerIdCaptured = true;
                  localStorage.setItem('onesignal_player_id', playerId);
                  window.dispatchEvent(new CustomEvent('onesignal-player-id-ready', {
                    detail: { playerId }
                  }));
                }
              }
            } catch (err) {
              console.warn('Could not capture player ID:', err);
            }
          };

          // Check player ID after a short delay only
          setTimeout(checkAndCapturePlayerId, 1500);
          setTimeout(checkAndCapturePlayerId, 4000); // After second prompt

          // Listen for permission changes
          if (OneSignal.Notifications?.addEventListener) {
          // Listen for permission changes
          if (OneSignal.Notifications?.addEventListener) {
            OneSignal.Notifications.addEventListener('permissionChange', async (permissionChange) => {
              console.log('🔔 Permission changed:', permissionChange);
              if (permissionChange.to === 'granted') {
                console.log('✅ Permission granted! Capturing player ID...');
                setTimeout(checkAndCapturePlayerId, 500);
              }
            });
          }

          // Setup notification event listeners using OneSignal browser SDK API
          const handleDisplay = (event) => {
            console.log('📱 Notification displayed:', event.notification?.title || 'unknown');
          };

          const handleClick = (event) => {
            const notification = event.notification || event;
            const payload = {
              notification,
              data: notification?.data,
            };

            console.log('🔔 Notification clicked:', notification?.title || 'notification opened');

            // Save the click payload so app navigation works even if React isn't mounted yet
            try {
              window.localStorage.setItem('onesignal-notification-click', JSON.stringify(payload));
            } catch (storageError) {
              console.warn('Could not store notification click payload:', storageError);
            }

            window.dispatchEvent(new CustomEvent('onesignal-notification-clicked', {
              detail: payload,
            }));
          };

          if (OneSignal.Notifications?.addEventListener) {
            OneSignal.Notifications.addEventListener('display', handleDisplay);
            OneSignal.Notifications.addEventListener('click', handleClick);
          } else if (OneSignal.Notifications?.on) {
            OneSignal.Notifications.on('display', handleDisplay);
            OneSignal.Notifications.on('click', handleClick);
          } else if (OneSignal.on) {
            OneSignal.on('notificationDisplay', handleDisplay);
            OneSignal.on('notificationClicked', handleClick);
          } else if (OneSignal.addListenerForNotificationOpened) {
            OneSignal.addListenerForNotificationOpened(handleClick);
          } else {
            console.warn('⚠️ OneSignal notification listeners not available on this SDK instance');
          }

          // Send welcome notification for first-time users
          const sendWelcomeNotification = async () => {
            try {
              const welcomeShownKey = 'clutchzone_welcome_shown';
              const lastWelcomeTime = localStorage.getItem('clutchzone_last_welcome');
              const now = Date.now();
              const oneDayMs = 24 * 60 * 60 * 1000; // 24 hours

              // Only show if not shown in last 24 hours or never shown
              if (!lastWelcomeTime || (now - parseInt(lastWelcomeTime)) > oneDayMs) {
                console.log('🎉 Sending welcome notification');

                // Get user info if logged in
                const token = localStorage.getItem('clutchzone_token');
                let userId = null;
                if (token) {
                  try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    userId = payload.userId;
                  } catch (e) {
                    console.warn('Could not decode token for welcome notification');
                  }
                }

                // Send welcome notification via API
                const API_BASE = window.location.hostname === 'localhost' 
                  ? 'http://localhost:5000/api' 
                  : 'https://paid-scrims-app.onrender.com/api';

                const response = await fetch(`${API_BASE}/auth/notifications/send-welcome`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token ? `Bearer ${token}` : ''
                  },
                  body: JSON.stringify({ userId })
                });

                if (response.ok) {
                  console.log('✅ Welcome notification sent');
                  localStorage.setItem('clutchzone_last_welcome', now.toString());
                } else {
                  console.warn('⚠️ Failed to send welcome notification:', response.status);
                }
              }
            } catch (error) {
              console.warn('⚠️ Could not send welcome notification:', error.message);
            }
          };

          // Send welcome notification after a short delay
          setTimeout(sendWelcomeNotification, 3000);
        } catch (error) {
          console.error('❌ OneSignal initialization failed:', error);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
