<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clutch Zone - Gaming Matches</title>

    <!-- OneSignal SDK for Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        try {
          // Initialize OneSignal
          await OneSignal.init({
            appId: "30266cf2-2ad3-49c8-ae4f-1de697e22b8f",
          });

          console.log('✅ OneSignal initialized successfully');

          // Setup notification event listeners using correct v16 API
          if (OneSignal.Notifications) {
            OneSignal.Notifications.addEventListener('display', (event) => {
              console.log('📱 Notification displayed:', event.notification.title);
            });

            OneSignal.Notifications.addEventListener('click', (event) => {
              const notification = event.notification;
              console.log('🔔 Notification clicked:', notification.title);

              // Dispatch custom event for React to handle navigation
              window.dispatchEvent(new CustomEvent('onesignal-notification-clicked', {
                detail: {
                  notification,
                  data: notification.data,
                },
              }));
            });
          }
        } catch (error) {
          console.error('❌ OneSignal initialization failed:', error);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
